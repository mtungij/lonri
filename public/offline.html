<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0284c7">
  <title>Lonri Offline</title>
  <style>
    body {
      margin: 0;
      font-family: Poppins, Arial, sans-serif;
      background: linear-gradient(140deg, #ecfeff 0%, #dbeafe 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }

    .card {
      width: min(460px, 92vw);
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(2, 132, 199, 0.18);
      padding: 24px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: #334155;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Lonri is Offline</h1>
    <p>You are currently offline. Reconnect to continue syncing latest members and payments data.</p>
  </main>
</body>
</html>
